name: Python Application CI

# Controls when the workflow will run
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    strategy:
      # Run the tests across multiple Python versions simultaneously
      matrix:
        python-version: ["3.14"]

    steps:
    # Step 1: Check out the repository code onto the runner
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Set up the specific Python version
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        # Caching dependencies speeds up workflow execution time
        cache: 'pip'

    # Step 3: Install all project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install development/testing tools
        pip install flake8 pytest

    # Step 4: Lint the code to catch syntax errors and stylistic flaws
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub Editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Step 5: Run your test suite
    - name: Test with pytest
      run: |
        pytest