name: Build and Push to Amazon ECR

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build, Push, and Run ECR Image
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code (so the runner can see your Dockerfile, app.py, etc.)
    - name: Checkout code
      uses: actions/checkout@v6

    # 2. Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3. Log into Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. BUILD the Dockerfile and PUSH it to AWS ECR
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: repository/my-flask-app
        IMAGE_TAG: latest
      run: |
        # This builds the Dockerfile located in your GitHub repository root
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        
        # This uploads the newly built image up to AWS ECR
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5. Optional: Run the container locally on the runner to verify it works
    - name: Run Docker Container
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: repository/my-flask-app
        IMAGE_TAG: latest
      run: |
        docker run -d -p 5000:5000 --name flask_app $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        sleep 5
        docker ps




