name: Python Application CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Download your code
    - name: Checkout repository code
      uses: actions/checkout@v6

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip' # This works perfectly now that requirements.txt exists!

    # 3. FIX: Install Flask and Pytest onto the GitHub runner
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run your tests with the correct path configuration
    - name: Test with pytest
      env:
        PYTHONPATH: .
      run: |
        pytest