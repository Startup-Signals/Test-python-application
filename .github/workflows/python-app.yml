name: Python Application CI & Docker Pull

on:
  push:
    branches: [ "main" ]

# Permissions required to authenticate with AWS via OIDC (Recommended)
permissions:
  id-token: write
  contents: read

jobs:
  build-test-and-pull:
    runs-on: ubuntu-latest

    steps:
    # 1. Download your repository code
    - name: Checkout repository code
      uses: actions/checkout@v6

    # 2. Authenticate with AWS
    # Replace the role-to-assume or use AWS Access Keys via GitHub Secrets
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3. Log into Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Pull the Docker Image from ECR
    - name: Pull Docker image from Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: my-flask-app
        IMAGE_TAG: latest
      run: |
        docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5. Optional: Run the container to verify it works
    - name: Run Docker Container
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: my-flask-app
        IMAGE_TAG: latest
      run: |
        docker run -d -p 5000:5000 --name flask_app $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        sleep 5
        docker ps

